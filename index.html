<!--Indica al navegador que este es un documento HTML moderno-->
<!DOCTYPE html>

<!--Apertura de la etiqueta principal del código, configurada en idioma español-->
<html lang="es">
<head>
    <!--El head es la configuración interna de la página. Lo que pongamos acá no se ve en la pantalla-->

    <!--Permite que la página muestre correctamente acentos y la eñe sin romperse-->
    <meta charset="UTF-8">

    <!--Hace que la web se adapte bien y no se vea minúscula en celulares y tablets-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Es el título que aparece arriba de todo en la pestaña del navegador-->
    <title>Iván Janosik - Piano</title>

    <!--Conecta este HTML con tu archivo CSS para darle diseño y color-->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!--El body es el cuerpo de la página. Todo lo que pongas acá SÍ se va a ver-->

    <header>
        <!--El header es el encabezado o la parte superior donde pusimos el fondo negro-->

        <!--h1 es el título principal y más importante de la página-->
        <h1>Iván Janosik</h1>

        <!--p significa párrafo. Se usa para textos comunes o descripciones cortas-->
        <p>Portfolio de Piano</p>
    </header>

    <main>
        <!--main envuelve todo el contenido central o principal de la página-->
        <section>
            <!--section sirve para organizar el contenido en bloques temáticos-->

            <!--h2 es un título secundario un subtítulo de la sección-->
            <h2>Bienvenidos</h2>

            <!--Otro párrafo con el texto explicativo de tu bienvenida-->
            <p>Próximamente verás aquí mis interpretaciones.</p>
        </section>
    </main>
</body>
</html>
